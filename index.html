<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Chatarrería PIPA</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
        </div>
        <div>
          <div class="logo-text"> Chatarrería PIPA</div>
          <div class="logo-sub">Precios Barranquilla — actualizado hoy</div>
        </div>
      </div>
      <div class="date-badge" id="dateBadge"></div>
    </header>


    <!-- TABS -->
    <nav class="tabs">
        <button class="tab active" data-tab="inventario">Inventario</button>
        <button class="tab" data-tab="movimientos">Movimientos</button>
        <button class="tab" data-tab="precios">Precios del día</button>
        <button class="tab" data-tab="factura">Factura</button>
      </nav>

      <section class="section active" id="tab-inventario">
        
        <div class="stats-grid" id="statsGrid"></div>

        <div class="card">
          <div class="card-title">Registrar entrada / salida</div>
          <div id="alertMsg" class="alert" role="alert"></div>
          <div class="movement-type">
            <button class="mt-btn sel-in" id="mtIn" data-type="entrada">
              <div class="mt-btn-icon">↓</div>
              <div class="mt-btn-title">Entrada</div>
              <div class="mt-btn-sub">Compra de material</div>
            </button>
            <button class="mt-btn" id="mtOut" data-type="salida">
              <div class="mt-btn-icon">↑</div>
              <div class="mt-btn-title">Salida</div>
              <div class="mt-btn-sub">Venta de material</div>
            </button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="movMat">Material</label>
              <select id="movMat"></select>
            </div>
            <div class="form-group">
              <label for="movKg">Peso (kg)</label>
              <input type="number" id="movKg" placeholder="0.0" min="0" step="0.1" />
            </div>
            <div class="form-group">
              <label for="movPrice">Precio/kg (opcional)</label>
              <input type="number" id="movPrice" placeholder="Precio automático" min="0" step="50" />
            </div>
            <div class="form-group">
              <label for="movNote">Nota</label>
              <input type="text" id="movNote" placeholder="Ej: camión placa ABC-123" />
            </div>
          </div>
          <div class="calc-result" id="calcRes">
            Total estimado: <span class="big" id="calcVal">$0</span>
          </div>
          <div class="actions">
            <button class="btn btn-primary" id="btnRegister">Registrar</button>
            <button class="btn btn-sm" id="btnClearMov">Limpiar</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Stock actual en bodega</div>
          <input class="search-box" id="searchBox" placeholder="Buscar material…" />
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Material</th>
                  <th>Categoría</th>
                  <th>Stock (kg)</th>
                  <th>Precio hoy</th>
                  <th>Valor est.</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="inventoryTable"></tbody>
            </table>
          </div>
        </div>

      </section> <section class="section" id="tab-movimientos">
        <div class="card">
          <div class="card-title">Historial de movimientos</div>
          <div class="form-row" style="margin-bottom: 1rem">
            <div class="form-group">
              <label for="fMat">Material</label>
              <select id="fMat">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="form-group">
              <label for="fType">Tipo</label>
              <select id="fType">
                <option value="">Todos</option>
                <option value="entrada">Entradas</option>
                <option value="salida">Salidas</option>
              </select>
            </div>
          </div>
          <div class="mov-list" id="movList"></div>
          <div style="margin-top: 0.85rem; display: flex; justify-content: flex-end;">
            <button class="btn btn-sm btn-danger" id="btnClearMovs">
              Limpiar historial
            </button>
          </div>
        </div>
      </section>

      <section class="section" id="tab-precios">
        <div class="card">
          <div class="card-title">Actualizar precio del día</div>
          <div class="form-row">
            <div class="form-group">
              <label for="updMat">Material</label>
              <select id="updMat"></select>
            </div>
            <div class="form-group">
              <label for="updPrice">Nuevo precio ($/kg)</label>
              <input type="number" id="updPrice" placeholder="0" min="0" step="50" />
            </div>
          </div>
          <button class="btn btn-primary" id="btnUpdatePrice">
            Actualizar
          </button>
        </div>
        <div class="card">
          <div class="card-title">Lista de precios — Barranquilla</div>
          <div id="priceChips"></div>
        </div>
      </section>

      <section class="section" id="tab-factura">
        <div class="card">
          <div class="card-title">Generar tiquete / factura</div>
          <div class="form-row">
            <div class="form-group">
              <label for="invClient">Cliente / proveedor</label>
              <input type="text" id="invClient" placeholder="Nombre o cédula" />
            </div>
            <div class="form-group">
              <label for="invType">Tipo</label>
              <select id="invType">
                <option value="COMPRA">Compra de material</option>
                <option value="VENTA">Venta de material</option>
              </select>
            </div>
          </div>
          <div id="invItems"></div>
          <button class="btn btn-sm" id="btnAddItem" style="margin-bottom: 0.85rem">
            + Agregar línea
          </button>
          <div class="actions">
            <button class="btn btn-primary" id="btnGenInvoice">
              Vista previa
            </button>
            <button class="btn btn-sm" id="btnClearInv">Limpiar</button>
          </div>
        </div>
        <div class="card" id="invPreviewCard" style="display: none">
          <div class="invoice-preview" id="invContent"></div>
          <div class="actions">
            <button class="btn btn-primary" id="btnPrint">Imprimir</button>
          </div>
        </div>
      </section>
  <!-- /.app -->

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
